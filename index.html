<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      mindar-image="imageTargetSrc: ./BillC92.mind; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 5; missTolerance: 10; smoothTolerance: 0.001; smoothCount: 20;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="exhibitModel" src="./Stop_Sign.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Dark Translucent Label Card -->
         <a-plane
          position="0 0.79 0.12"
          width="1.0"
          height="0.67"
          material="color: #111111; transparent: true; opacity: 0.82; depthWrite: false; shader: flat;"></a-plane>
          
        <!-- Title -->
         <a-text
          value="Bill C-92"
          position="-0.42 0.69 0.20"
          width="1.2"
          color="#ffffff"
          align="left">
         </a-text>


      </a-entity>
    </a-scene>
  </body>
</html>
